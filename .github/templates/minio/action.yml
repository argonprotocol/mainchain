name: Install Minio
description: |
  Add Minio to the GitHub runner

runs:
  using: "composite"
  steps:
    - name: Install Minio
      if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
      shell: bash
      run: |
        set -eu
        platform="darwin"
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          platform="linux"
        fi

        arch=$(uname -m)
        arch_part="amd64"
        if [[ "$arch" == "aarch64" || "$arch" == "arm64" ]]; then
          arch_part="arm64"
        fi

        url="https://dl.min.io/server/minio/release/${platform}-${arch_part}/minio"
        curl --fail --location --silent --show-error "$url" -o minio
        curl --fail --location --silent --show-error "${url}.sha256sum" -o minio.sha256sum
        expected_sha=$(awk '{print $1}' minio.sha256sum)
        actual_sha=$(shasum -a 256 minio)
        actual_sha=${actual_sha%% *}
        if [[ "$actual_sha" != "$expected_sha" ]]; then
          echo "Minio checksum verification failed for $url" >&2
          exit 1
        fi
        chmod +x minio
        sudo mv minio /usr/local/bin

    - name: Start Minio on Linux and macOS
      shell: bash
      run: |
        mkdir -p /tmp/minio
        nohup minio server /tmp/minio &
