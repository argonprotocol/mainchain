name: Try runtime upgrades

on:
  push:
    branches:
      - v[0-9]+.*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  TRY_RUNTIME_VERSION: 0.8.0
  TRY_RUNTIME_SHA256: e269a1af856494e21b5ee17d0305c3a3a97ebca46d2c4b4db3ddddc290828b14

jobs:
  build-runtimes:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: 'false'

      - uses: ./.github/templates/rust-cache
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: try-runtime

      - name: Build Runtimes
        run: |
          cargo build --profile release -p argon-canary-runtime -p argon-runtime --features try-runtime -q --locked
        shell: bash

      - name: Flatten Runtimes
        run: |
          mkdir -p runtimes
          cp target/release/wbuild/*/*.compact.compressed.wasm runtimes/

      - name: Upload Debug Assets
        uses: actions/upload-artifact@v6
        with:
          name: runtimes
          path: ./runtimes
          if-no-files-found: error

  try-runtime-upgrade:
    needs: build-runtimes
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        runtime:
          - { artifact: "argon_canary_runtime", uri: "wss://rpc.testnet.argonprotocol.org" }
          - { artifact: "argon_runtime", uri: "wss://rpc.argon.network" }
    steps:
      - name: Download try-runtime-cli
        run: |
          set -eu
          curl --fail --location --silent --show-error "https://github.com/paritytech/try-runtime-cli/releases/download/v${TRY_RUNTIME_VERSION}/try-runtime-x86_64-unknown-linux-musl" -o try-runtime
          echo "${TRY_RUNTIME_SHA256}  try-runtime" | shasum -a 256 -c -
          chmod +x ./try-runtime
        shell: bash

      - name: Download runtime artifacts
        uses: actions/download-artifact@v7
        with:
          name: runtimes
          path: ./runtimes

      - name: List runtimes
        run: ls -R runtimes

      - name: Try testnet runtime upgrades
        run: |
          ./try-runtime \
            --runtime ./runtimes/${{ matrix.runtime.artifact }}.compact.compressed.wasm \
            on-runtime-upgrade \
              --print-storage-diff \
              --blocktime 60000 \
              --disable-mbm-checks \
            live --uri ${{ matrix.runtime.uri }}
